name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-and-readiness:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      parkcore-db:
        image: postgres:16
        env:
          POSTGRES_USER: parkcore
          POSTGRES_PASSWORD: parkcore
          POSTGRES_DB: parkcore-db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U parkcore -d parkcore-db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Database bootstrap check
        env:
          DATABASE_URL: postgresql://parkcore:parkcore@localhost:5432/parkcore-db
        run: pnpm db:setup

      - name: Pipeline checks
        run: pnpm quality:ci

      - name: Build and release readiness checks
        run: pnpm release:readiness
